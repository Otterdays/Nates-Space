<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel — Nate's Space</title>
    <meta name="description" content="Owner-only admin tools for Nate's Space feed moderation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=130">
</head>

<body class="music-page-body">
    <canvas id="particleCanvas"></canvas>
    <div class="music-page-shell">
        <nav class="top-nav glass-panel music-top-nav">
            <div class="nav-left-group">
                <a href="index.html" class="logo music-logo-link" title="Back to feed">NATE'S SPACE</a>
                <div class="nav-page-links">
                    <a href="index.html" class="nav-text-link">Feed</a>
                    <span class="nav-text-link nav-text-current" aria-current="page">Admin</span>
                </div>
            </div>
            <div class="nav-controls">
                <button type="button" class="nav-auth-btn" id="adminAuthBtn" hidden>Sign in</button>
                <button type="button" class="nav-btn" id="themeToggle" title="Switch Theme">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </nav>

        <main class="music-main">
            <header class="glass-panel music-library-header">
                <h1 class="music-library-title">Admin panel</h1>
                <p class="platforms-intro">Owner-only feed management for live Firestore posts and comments.</p>
                <p class="admin-meta" id="adminUserState">Checking auth...</p>
            </header>

            <section class="glass-panel music-library-panel admin-access-panel" id="adminAccessNotice">
                <p class="admin-notice-title">Access required</p>
                <p class="admin-notice-body">Sign in with the owner Google account to view moderation tools.</p>
            </section>

            <section class="glass-panel music-library-panel admin-panel" id="adminApp" hidden>
                <div class="admin-toolbar">
                    <h2 class="music-lib-heading">Live posts</h2>
                    <button type="button" class="btn" id="adminReloadBtn">Reload</button>
                </div>
                <div class="admin-post-list" id="adminPostList"></div>
                <button type="button" class="btn" id="adminLoadMoreBtn" hidden>Load more</button>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=130"></script>
    <script src="js/theme-layout.js?v=130"></script>
    <script src="js/particles.js?v=130"></script>
    <script src="js/admin-panel.js?v=130"></script>
</body>

</html>
